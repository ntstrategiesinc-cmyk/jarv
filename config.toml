# Jarvis configuration — human-editable, read at startup.
# Secrets do NOT live here; they live in .env (gitignored). See .env.example.
# Mutable runtime state (kill switch, schedules, inbox) lives in jarvis/state/*.json,
# because tomllib is read-only.

[model]
# The brain. Swappable behind the provider seam (jarvis/core/provider.py).
name = "claude-opus-4-8"
max_tokens = 2048
# Per-million-token prices (USD) used only for the audit cost tally. Adjust to your plan.
input_price_per_mtok = 5.0
output_price_per_mtok = 25.0

[persona]
# Reinforces AGENT.md tone in the system prompt.
name = "Jarvis"
tone = "Crisp and professional. Efficient, businesslike, minimal small talk."

[tools]
# The hard confirmation gate (Tier 6). Any tool named here must get an explicit yes
# before it runs, regardless of entry path (typed / spoken / heartbeat).
# Read-only tools omitted here run freely.
needs_confirmation = ["post_photo", "leads_add", "leads_update", "leads_delete"]
# Seconds a heartbeat-initiated confirmation waits before timing out to a safe default (deny).
# Typed/spoken confirmations wait for the human with no timeout.
confirm_timeout_seconds = 120

[leads]
# Spreadsheet the lead tools read and write.
workbook_path = "leads.xlsx"
sheet_name = "Leads"

[memory]
# Long-term memory: a plain, human-readable file (one durable fact per line). Open and edit
# it by hand any time. Gitignored — it holds personal facts.
path = "jarvis/memory/memory.md"

[intake]
# Drop furniture product photos here, each named "Title - Price.jpg"
# (e.g. "Oak Dining Table - 499.jpg"). Jarvis reads the title and price from the filename.
# "{desktop}" = your real Desktop (works even if OneDrive manages it). Change it to any folder.
dir = "{desktop}/Jarvis/Furniture/Intake"

# The owner's businesses. Each has a Desktop folder where sales emails / leads are dropped.
[[businesses]]
name = "Website & Sales"
leads_folder = "{desktop}/Jarvis/Leads/Website & Sales"
[[businesses]]
name = "Solid Wood Builds & Sheds"
leads_folder = "{desktop}/Jarvis/Leads/Solid Wood Builds & Sheds"
[[businesses]]
name = "Furniture Staging"
leads_folder = "{desktop}/Jarvis/Leads/Furniture Staging"

[instagram]
# Jarvis's OWN original Instagram content to grow followers (design tips, room inspiration,
# trends, engagement posts) — SEPARATE from product listings. Not the product photos.
dir = "{desktop}/Jarvis/Instagram"

[staging]
# AI photo staging for the furniture pipeline. Key (OPENAI_API_KEY) lives in .env.
provider = "openai"
model = "gpt-image-1"
size = "1024x1024"        # 1024x1024 | 1536x1024 | 1024x1536 | auto
quality = "medium"        # low | medium | high  (higher = better + costlier)
output_dir = "{desktop}/Jarvis/Furniture/Pending Approval"
# The staging instruction. Tune this to taste — it shapes how every photo is restyled.
prompt = "Restage this furniture product as a professional e-commerce marketing photo: place the exact item in a tastefully designed, well-lit interior appropriate to the piece, with clean uncluttered composition and realistic shadows and perspective. Keep the product's shape, color, material, and proportions EXACTLY as in the original photo. Photorealistic, high-end catalog style."

[social]
# Meta Graph API. Tokens/IDs live in .env, not here.
graph_api_version = "v22.0"

[voice]
# How a spoken turn is triggered:
#   "enter" = press Enter to start recording, Enter again to stop (no global hotkey; most reliable)
#   "ptt"   = hold push_to_talk_key to talk (needs pynput to capture keys in your terminal)
input_mode = "enter"
# Tier 3. voice_id chosen when wiring voice; kept here, not hardcoded.
elevenlabs_voice_id = "pNInz6obpgDQGcFmaJgB"  # ElevenLabs premade "Adam" (free-tier accessible)
elevenlabs_model_id = "eleven_flash_v2_5"
tts_sample_rate = 24000      # ElevenLabs pcm_24000 output
stt_sample_rate = 16000      # mic capture rate sent to Deepgram
deepgram_model = "nova-3"
push_to_talk_key = "tab"     # hold to talk (reliable on laptops; not a hardware F-key)

[heartbeat]
# Tier 5. The background loop wakes every tick_seconds; each check sets its own cadence.
tick_seconds = 60
quiet_hours_start = "22:00"  # non-urgent surfacing waits until quiet_hours_end
quiet_hours_end = "08:00"
misfire_grace_seconds = 300  # coalesce missed runs after wake-from-sleep into one

# Scheduled checks live here, not in code. Each: a unique name, a `type` (which check function),
# how often (every_minutes), enabled, severity ("alert" may interrupt; "notice" stays quiet in the
# inbox), plus check-specific fields.

# Triggerable test check: drop a file at jarvis/state/heartbeat_trigger.txt and the next tick
# surfaces it once (the file is consumed). Handy for verifying the loop.
[[heartbeat.checks]]
name = "trigger_file"
type = "watch_file"
enabled = true
every_minutes = 1
file = "heartbeat_trigger.txt"
severity = "alert"
title = "Manual trigger detected"

# Real example: leads still marked "new" older than N days need follow-up. Quiet by default.
[[heartbeat.checks]]
name = "stale_leads"
type = "stale_leads"
enabled = false
every_minutes = 1440
older_than_days = 7
severity = "notice"
